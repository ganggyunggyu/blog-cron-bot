<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">노출지기 운영 인프라 아키텍처</title>
  <desc id="desc">사용자와 Codex 예약이 Railway 제어 서비스에 작업을 요청하고, MongoDB 작업 큐를 통해 다섯 개 워커가 네이버 검색을 처리한 뒤 제어 서비스가 결과 시트와 Dooray 알림을 최종 반영하는 구조</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-slate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#059669"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 34px Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #64748b; }
      .group-title { font: 700 20px Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #1e3a8a; }
      .node-title { font: 700 18px Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0f172a; }
      .node-text { font: 500 15px Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #475569; }
      .worker-title { font: 700 16px Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #064e3b; }
      .edge-label { font: 600 14px Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #475569; }
      .note { font: 500 14px Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #64748b; }
      .edge-blue { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow-blue); }
      .edge-slate { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow-slate); }
      .edge-green { fill: none; stroke: #059669; stroke-width: 3; marker-end: url(#arrow-green); }
      .edge-dashed { stroke-dasharray: 9 7; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="#f8fafc"/>
  <text x="70" y="64" class="title">노출지기 운영 인프라 아키텍처</text>
  <text x="70" y="96" class="subtitle">웹 원클릭 실행 · 50개 단위 분산 처리 · 원본 시트 읽기 전용 · 최종 반영 단일화</text>

  <!-- Entry points -->
  <g filter="url(#shadow)">
    <rect x="70" y="145" width="255" height="95" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="197.5" y="181" text-anchor="middle" class="node-title">사용자</text>
    <text x="197.5" y="211" text-anchor="middle" class="node-text">웹에서 버튼 한 번 클릭</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="275" width="255" height="95" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="197.5" y="311" text-anchor="middle" class="node-title">Codex 예약</text>
    <text x="197.5" y="341" text-anchor="middle" class="node-text">매일 오전 8시 실행</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="430" width="255" height="115" rx="18" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <text x="197.5" y="468" text-anchor="middle" class="node-title">Google Sheets 원본</text>
    <text x="197.5" y="498" text-anchor="middle" class="node-text">순서 · 중복 · 공백 보존</text>
    <text x="197.5" y="526" text-anchor="middle" class="edge-label" fill="#b45309">읽기 전용</text>
  </g>

  <!-- Railway control plane -->
  <rect x="385" y="125" width="730" height="285" rx="28" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="420" y="166" class="group-title">Railway 제어 서비스 · blog-cron-bot</text>

  <g filter="url(#shadow)">
    <rect x="420" y="195" width="285" height="82" rx="16" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
    <text x="562.5" y="226" text-anchor="middle" class="node-title">Next.js 대시보드</text>
    <text x="562.5" y="254" text-anchor="middle" class="node-text">원클릭 실행 · 로그 · 결과 다운로드</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="790" y="195" width="285" height="82" rx="16" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
    <text x="932.5" y="226" text-anchor="middle" class="node-title">실행 잠금</text>
    <text x="932.5" y="254" text-anchor="middle" class="node-text">노출체크 중복 실행 방지</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="420" y="307" width="285" height="72" rx="16" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
    <text x="562.5" y="337" text-anchor="middle" class="node-title">개별 실행기</text>
    <text x="562.5" y="363" text-anchor="middle" class="node-text">패키지 · 일반 · 도그마루 · 루트 · 카페</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="790" y="307" width="285" height="72" rx="16" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
    <text x="932.5" y="337" text-anchor="middle" class="node-title">분산 작업 관리자</text>
    <text x="932.5" y="363" text-anchor="middle" class="node-text">키워드 50개 단위 shard 생성</text>
  </g>

  <!-- Queue and finalizer -->
  <g filter="url(#shadow)">
    <rect x="470" y="465" width="420" height="125" rx="24" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <ellipse cx="680" cy="487" rx="190" ry="16" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="680" y="525" text-anchor="middle" class="node-title">MongoDB Atlas</text>
    <text x="680" y="553" text-anchor="middle" class="node-text">키워드 · 노출 결과 · 분산 작업 큐</text>
    <text x="680" y="577" text-anchor="middle" class="note">60초 임대 · 15초 heartbeat · 최대 2회 시도</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1160" y="450" width="360" height="150" rx="22" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="1340" y="489" text-anchor="middle" class="node-title">최종 반영 관리자</text>
    <text x="1340" y="520" text-anchor="middle" class="node-text">모든 작업 성공 후 한 번만 실행</text>
    <text x="1340" y="548" text-anchor="middle" class="node-text">결과 병합 · 시트 재조회 검증</text>
    <text x="1340" y="576" text-anchor="middle" class="node-text">Dooray 알림 · 진행률 집계</text>
  </g>

  <!-- Workers -->
  <rect x="385" y="655" width="730" height="175" rx="28" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="420" y="696" class="group-title" fill="#065f46">Railway 분산 워커 서비스</text>
  <g>
    <rect x="420" y="730" width="120" height="65" rx="14" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <rect x="555" y="730" width="120" height="65" rx="14" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <rect x="690" y="730" width="120" height="65" rx="14" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <rect x="825" y="730" width="120" height="65" rx="14" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <rect x="960" y="730" width="120" height="65" rx="14" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <text x="480" y="770" text-anchor="middle" class="worker-title">Worker 1</text>
    <text x="615" y="770" text-anchor="middle" class="worker-title">Worker 2</text>
    <text x="750" y="770" text-anchor="middle" class="worker-title">Worker 3</text>
    <text x="885" y="770" text-anchor="middle" class="worker-title">Worker 4</text>
    <text x="1020" y="770" text-anchor="middle" class="worker-title">Worker 5</text>
  </g>

  <!-- Naver and outputs -->
  <g filter="url(#shadow)">
    <rect x="555" y="895" width="390" height="105" rx="20" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="750" y="934" text-anchor="middle" class="node-title">Naver 검색</text>
    <text x="750" y="965" text-anchor="middle" class="node-text">HTTP 크롤러 + Playwright 브라우저 폴백</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1160" y="665" width="360" height="260" rx="22" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="1340" y="704" text-anchor="middle" class="node-title">검증된 최종 산출물</text>
    <rect x="1195" y="730" width="290" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="1195" y="798" width="290" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="1195" y="866" width="290" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1340" y="762" text-anchor="middle" class="node-text">Railway Volume · CSV · 로그</text>
    <text x="1340" y="830" text-anchor="middle" class="node-text">Google Sheets 결과 · 쓰기 후 재조회</text>
    <text x="1340" y="898" text-anchor="middle" class="node-text">Dooray · 결과 요약 + 시트 링크</text>
  </g>

  <!-- Connections -->
  <path d="M325 193 H385 Q405 193 420 220" class="edge-blue"/>
  <path d="M325 323 H360 Q385 323 420 245" class="edge-blue edge-dashed"/>
  <path d="M705 236 H790" class="edge-blue"/>
  <path d="M932 277 V307" class="edge-blue"/>
  <path d="M790 343 H705" class="edge-blue"/>
  <path d="M932 379 V425 Q932 450 890 490" class="edge-blue"/>
  <path d="M325 488 H395 Q430 488 470 515" class="edge-slate edge-dashed"/>
  <path d="M325 475 H360 Q390 475 420 353" class="edge-slate edge-dashed"/>
  <text x="344" y="462" class="edge-label">읽기만</text>
  <path d="M680 590 V655" class="edge-green"/>
  <text x="698" y="628" class="edge-label">작업 가져오기</text>
  <path d="M750 830 V895" class="edge-green"/>
  <path d="M555 343 H365 V947 H555" class="edge-slate"/>
  <text x="382" y="870" class="edge-label">개별 실행</text>
  <path d="M945 947 H1015 V575 H1160" class="edge-green"/>
  <text x="969" y="922" class="edge-label">노출 결과</text>
  <path d="M890 530 H1160" class="edge-green"/>
  <text x="962" y="517" class="edge-label">완료 조각 집계</text>
  <path d="M1340 600 V665" class="edge-green"/>
  <path d="M1160 490 H1100 V255 H1075" class="edge-slate edge-dashed"/>
  <text x="1110" y="280" class="edge-label">SSE 진행률</text>

  <rect x="70" y="1015" width="1450" height="1" fill="#cbd5e1"/>
  <text x="70" y="1049" class="note">원본 시트와 최종 결과 시트의 쓰기 경계를 분리하고, 개별 워커는 MongoDB 결과만 갱신합니다.</text>
</svg>
